# ============================================================
# RAG_Project — 全容器部署 (应用 + 基础设施)
# ============================================================

services:
  # ===== FastAPI 应用 =========================================
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: docker-app:latest
    container_name: rag-app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # 容器内使用 Docker 网络 DNS 访问其他服务
      - RAG_CHROMA_HOST=chromadb
      - RAG_CHROMA_PORT=8000
      - RAG_REDIS_HOST=redis
      - RAG_REDIS_PORT=6379
      - RAG_POSTGRES_DSN=postgresql://raguser:${RAG_PG_PASSWORD:-changeme}@postgres:5432/ragdb
      - RAG_LANGFUSE_HOST=http://langfuse-server:3000
      # Entrypoint 需要: psql 连接参数 + alembic 使用的 DSN
      - POSTGRES_HOST=postgres
      - PGPASSWORD=${RAG_PG_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped

  # ===== PostgreSQL (pgvector) =================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ${RAG_PG_PASSWORD:-changeme}
      POSTGRES_DB: ragdb
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network
    restart: unless-stopped

  # ===== Redis =================================================
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - rag-network
    restart: unless-stopped

  # ===== ChromaDB ==============================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: rag-chromadb
    ports:
      - "8001:8000"
    volumes:
      - ../data/db/chroma:/data
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
      ALLOW_RESET: "TRUE"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - rag-network
    restart: unless-stopped

  # ===== LangFuse Server =======================================
  langfuse-server:
    image: langfuse/langfuse:2
    container_name: rag-langfuse
    ports:
      - "3001:3000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://langfuse:${RAG_LANGFUSE_DB_PASSWORD:-changeme}@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${RAG_LANGFUSE_AUTH_SECRET:-changeme}
      SALT: ${RAG_LANGFUSE_SALT:-changeme}
      ENCRYPTION_KEY: ${RAG_LANGFUSE_ENCRYPTION_KEY:-changeme}
      TELEMETRY_ENABLED: "false"
    depends_on:
      langfuse-db:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped

  # ===== LangFuse Database =====================================
  langfuse-db:
    image: postgres:16
    container_name: rag-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${RAG_LANGFUSE_DB_PASSWORD:-changeme}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network
    restart: unless-stopped


volumes:
  pg_data:
  redis_data:
  langfuse_db_data:

networks:
  rag-network:
    driver: bridge
